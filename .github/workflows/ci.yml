name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hearth/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hearth/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build
        env:
          # Build-time placeholders so the bundle compiles in CI without secrets.
          VITE_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          VITE_HORIZON_URL: https://horizon-testnet.stellar.org
          VITE_CONTRACT_ID: CDVBVFHHBKV2NKOLMM3BCHJQTEIFBXJZ2DMH7SMT22RI3W3GHZJOBM62
          VITE_USDC_ISSUER: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
          VITE_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          VITE_GROUPS_API_BASE_URL: http://localhost:4000
